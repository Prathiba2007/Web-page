<script>
// AJAX + JSON + JavaScript

document.getElementById("loadBtn").addEventListener("click", function () {

    // Simulating AJAX fetch from embedded JSON
    const jsonData = document.getElementById("poochiData").textContent;
    const data = JSON.parse(jsonData);

    const container = document.getElementById("poochiContainer");
    container.innerHTML = "";

    data.poochis.forEach(function(poochi) {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${poochi.image}" alt="${poochi.name}">
            <h3>${poochi.name}</h3>
            <p>${poochi.description}</p>
        `;

        container.appendChild(card);
    });

});
</script>
